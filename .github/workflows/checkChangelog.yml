name: Check and Post Changelog

on:
  # schedule:
  #   - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_sha.outputs.changed }}
      new_sha: ${{ steps.check_sha.outputs.new_sha }}
      old_sha: ${{ steps.check_sha.outputs.old_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        id: check_sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_SHA=$(gh api repos/CANDY-HOUSE/.github/commits?path=changelog.html\&per_page=1 --jq '.[0].sha')
          
          LAST_SHA=""
          [ -f last_sha.txt ] && LAST_SHA=$(cat last_sha.txt)
          
          if [ "$LATEST_SHA" != "$LAST_SHA" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "new_sha=$LATEST_SHA" >> $GITHUB_OUTPUT
            echo "old_sha=$LAST_SHA" >> $GITHUB_OUTPUT
            echo "変更を検知しました: $LATEST_SHA"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "変更なし。"
          fi

  post-to-x:
    needs: check-changes
    if: needs.check-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post to X
        env:
          LAST_SHA: ${{ needs.check-changes.outputs.old_sha }}
          LATEST_SHA: ${{ needs.check-changes.outputs.new_sha }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python post_to_x.py

      - name: Update last_sha.txt
        run: |
          echo "${{ needs.check-changes.outputs.new_sha }}" > last_sha.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_sha.txt
          git commit -m "Update changelog SHA to ${{ needs.check-changes.outputs.new_sha }}"
          git push
