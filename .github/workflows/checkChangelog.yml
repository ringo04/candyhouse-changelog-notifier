name: chack changelog

on:
  # schedule:
    # - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_sha.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        id: check_sha
        run: |
          # 最新のコミットSHAを取得
          LATEST_SHA=$(curl -s "https://api.github.com/repos/CANDY-HOUSE/.github/commits?path=changelog.html&per_page=1" | jq -r '.[0].sha')
          
          # 前回のSHAを読み込み
          touch last_sha.txt
          LAST_SHA=$(cat last_sha.txt)
          
          if [ "$LATEST_SHA" != "$LAST_SHA" ]; then
            echo "latest_sha=$LATEST_SHA" >> $GITHUB_ENV
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "変更を検知しました。"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "変更はありません。"
          fi

      # Pythonのセットアップ（変更検知の前、または条件なしで置くのが安全）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 依存ライブラリのインストール（ここから if を外すと確実です）
      - name: Install dependencies
        run: |
          pip install requests requests_oauthlib

      # 実際の投稿処理（ここは 'true' の時だけでOK）
      - name: Post to X
        if: steps.check_sha.outputs.changed == 'true'
        env:
          PYTHONUNBUFFERED: "1"
          # ↓ ここを追加（Python側の os.environ.get("LAST_SHA") などに対応）
          LAST_SHA: ${{ env.last_sha }} 
          LATEST_SHA: ${{ env.latest_sha }}
          # --------------------------------------------------
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python post_to_x.py

      - name: Update last_sha.txt
        if: steps.check_sha.outputs.changed == 'true'
        run: |
          echo "${{ env.latest_sha }}" > last_sha.txt
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_sha.txt
          git commit -m "Update last_sha: ${{ env.latest_sha }}"
          git push
